name: Playwright BDD CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      BROWSER: chromium
      HEADLESS: true
      RECORD_VIDEO: true
      ORANGEHRM_USERNAME: Admin
      ORANGEHRM_PASSWORD: admin123
      ORANGEHRM_BASE_URL: https://opensource-demo.orangehrmlive.com/web/index.php
      BSTACK_BASE_URL: https://bstackdemo.com
      BSTACK_PASSWORD: testingisfun99
      DEFAULT_TIMEOUT_MS: 90000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Cucumber BDD suite
        run: npm test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-bdd-reports
          path: reports/
          if-no-files-found: warn

